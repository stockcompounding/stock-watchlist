  .masthead {

  .asof b { color: var(--ink); font-weight: 600; font-variant-numeric: tabular-nums; }

  .segmented button:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

    cursor: pointer; user-select: none; border-bottom: 1px solid var(--hair-strong);

  thead th:hover { color: var(--ink); }
  thead th:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

  tbody td {
    padding: 0 14px; height: 46px; text-align: right; white-space: nowrap;
    font-family: var(--font-num); font-variant-numeric: tabular-nums; font-size: 13px;
    color: var(--ink); border-bottom: 1px solid var(--hair);

  .pill { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 999px; white-space: nowrap; letter-spacing: 0.01em; }

  .pill.sell { background: var(--neg-soft); color: var(--neg); }
  .rating .cnt { font-family: var(--font-num); font-size: 10.5px; color: var(--ink-faint); }

  /* 52wk bar */
  .range { display: flex; align-items: center; gap: 8px; justify-content: flex-end; }
  .range .track { position: relative; width: 74px; height: 5px; border-radius: 3px; background: var(--surface-2); overflow: visible; }
  .range .fill { position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent-soft), var(--accent)); opacity: .55; }
  .range .dot { position: absolute; top: 50%; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); transform: translate(-50%, -50%); box-shadow: 0 0 0 2px var(--surface); }
  .range .pct { font-size: 10.5px; color: var(--ink-faint); width: 30px; text-align: right; }

  .legend { margin-top: 16px; font-size: 11.5px; color: var(--ink-muted); line-height: 1.7; }
  .legend .k { display: inline-flex; align-items: center; gap: 5px; margin-right: 16px; }
  .legend b { color: var(--ink); font-weight: 600; }
  .legend .em { font-family: var(--font-num); color: var(--ink-faint); }
  .footnote { margin-top: 10px; font-size: 11px; color: var(--ink-faint); line-height: 1.6; }
  .footnote a { color: var(--accent-ink); text-decoration: none; }
  .footnote a:hover { text-decoration: underline; }
  .empty { padding: 40px; text-align: center; color: var(--ink-faint); font-family: var(--font-ui); font-size: 13px; }

  @media (prefers-reduced-motion: reduce) { * { transition: none !important; } }
  @media (max-width: 560px) {
    .asof { margin-left: 0; text-align: left; width: 100%; }
    .chip { min-width: 78px; flex: 1 1 auto; }
  }
</style>

        var arrow = r.day > 0.0005 ? "&#9650;" : r.day < -0.0005 ? "&#9660;" : "&middot;";
        var cls = r.day > 0.0005 ? "pos" : r.day < -0.0005 ? "neg" : "flat";
        return '<span class="change ' + cls + '">' + arrow + " " + (r.day > 0 ? "+" : "") + r.day.toFixed(2) + "%</span>";
      } },
    { id: "mcap", label: "Mkt Cap", num: true, render: function (r) { return fmtMcap(r.mcap); } },
    { id: "pe", label: "P/E", num: true, render: function (r) { return fmtNum(r.pe, 1); } },
    { id: "fwdpe", label: "Fwd P/E", num: true, render: function (r) { return fmtNum(r.fwdpe, 1); } },
    { id: "target", label: "Avg Target", num: true, render: function (r) { return fmtPrice(r.target); } },
    { id: "upside", label: "Upside", num: true, render: function (r) { return fmtPct(r.upside, true); } },
    { id: "rating", label: "Analyst Rating", num: true, sortKey: "ratingScore", render: function (r) { return ratingPill(r.rating, r.analysts); } },
    { id: "range", label: "52-wk Range", num: true, render: function (r) { return rangeBar(r.range); } }
  ];

  // ---- State (persisted) ----
  var LS = "watchlist_state_v1";
  var state = { sort: "mcap", dir: -1, type: "all", q: "" };
  try { var s = JSON.parse(localStorage.getItem(LS)); if (s) Object.assign(state, s); } catch (e) {}
  function save() { try { localStorage.setItem(LS, JSON.stringify(state)); } catch (e) {} }

  // ---- Render header ----
  var headrow = document.getElementById("headrow");
  COLS.forEach(function (c) {
    var th = document.createElement("th");
    th.textContent = c.label;
    th.tabIndex = 0;
    th.setAttribute("data-col", c.id);
    var arrow = document.createElement("span");
    arrow.className = "arrow"; arrow.innerHTML = "&#9660;";
    th.appendChild(arrow);
    function toggle() {
      var key = c.sortKey || c.id;
      if (state.sort === key) { state.dir *= -1; }
      else { state.sort = key; state.dir = (c.num || c.sortKey) ? -1 : 1; }
      save(); render();
    }
    th.addEventListener("click", toggle);
    th.addEventListener("keydown", function (e) { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); } });
    headrow.appendChild(th);
  });

  var body = document.getElementById("body");

  function sortVal(r) {
    var v = r[state.sort];
    return (v == null || (typeof v === "number" && isNaN(v))) ? null : v;
  }

  function render() {
    // header active state
    Array.prototype.forEach.call(headrow.children, function (th) {
      var c = COLS[Array.prototype.indexOf.call(headrow.children, th)];
      var key = c.sortKey || c.id;
      var active = key === state.sort;
      th.setAttribute("data-active", active ? "true" : "false");
      th.querySelector(".arrow").innerHTML = state.dir === 1 ? "&#9650;" : "&#9660;";
    });

    var q = state.q.trim().toLowerCase();
    var list = rows.filter(function (r) {
      if (state.type !== "all" && r.type !== state.type) return false;
      if (q && r.sym.toLowerCase().indexOf(q) === -1 && r.name.toLowerCase().indexOf(q) === -1) return false;
      return true;
    });

    list.sort(function (a, b) {
      var va = sortVal(a), vb = sortVal(b);
      if (va == null && vb == null) return a.sym.localeCompare(b.sym);
      if (va == null) return 1;   // nulls always last
      if (vb == null) return -1;
      if (typeof va === "string") return va.localeCompare(vb) * state.dir;
      return (va - vb) * state.dir;
    });

    body.innerHTML = "";
    if (!list.length) {
      var tr = document.createElement("tr");
      tr.innerHTML = '<td colspan="' + COLS.length + '" class="empty">No names match your filter.</td>';
      body.appendChild(tr);
      updateSummary(list); return;
    }

    var frag = document.createDocumentFragment();
    list.forEach(function (r) {
      var tr = document.createElement("tr");
      var tds = COLS.map(function (c, i) {
        if (i === 0) {
          var tag = r.type === "etf" ? '<span class="tag">ETF</span>' : r.type === "crypto" ? '<span class="tag">CRYPTO</span>' : "";
          return '<td class="tkr"><span class="row"><span class="sym">' + r.sym + tag + '</span>' +
                 '<span class="nm">' + r.name + '</span></span></td>';
        }
        return "<td>" + c.render(r) + "</td>";
      });
      tr.innerHTML = tds.join("");
      frag.appendChild(tr);
    });
    body.appendChild(frag);
    updateSummary(list);
  }

  function updateSummary(list) {
    var stocks = rows.filter(function (r) { return r.type === "stock"; });
    var ups = stocks.filter(function (r) { return r.upside != null; });
    var avgUp = ups.reduce(function (a, r) { return a + r.upside; }, 0) / (ups.length || 1);
    var strongBuys = stocks.filter(function (r) { return r.rating === "Strong Buy"; }).length;
    var top = ups.slice().sort(function (a, b) { return b.upside - a.upside; })[0];
    var chips = [
      { k: "Names", v: rows.length, cls: "" },
      { k: "Avg Upside", v: (avgUp >= 0 ? "+" : "") + avgUp.toFixed(1) + "%", cls: avgUp >= 0 ? "pos" : "neg" },
      { k: "Strong Buys", v: strongBuys + "/" + stocks.length, cls: "" },
      { k: "Top Upside", v: top ? top.sym + " +" + top.upside.toFixed(0) + "%" : "&mdash;", cls: "pos" }
    ];
    document.getElementById("summary").innerHTML = chips.map(function (c) {
      return '<div class="chip"><span class="k">' + c.k + '</span><span class="v ' + c.cls + '">' + c.v + "</span></div>";
    }).join("");
  }

  // ---- Wire toolbar ----
  var search = document.getElementById("search");
  search.value = state.q;
  search.addEventListener("input", function () { state.q = search.value; save(); render(); });

  var tf = document.getElementById("typefilter");
  Array.prototype.forEach.call(tf.querySelectorAll("button"), function (btn) {
    btn.setAttribute("aria-pressed", btn.getAttribute("data-type") === state.type ? "true" : "false");
    btn.addEventListener("click", function () {
      state.type = btn.getAttribute("data-type"); save();
      Array.prototype.forEach.call(tf.querySelectorAll("button"), function (b) {
        b.setAttribute("aria-pressed", b === btn ? "true" : "false");
      });
      render();
    });
  });

  // ---- Header meta ----
  document.getElementById("asof").innerHTML =
    "Prices as of <b>" + PRICE_ASOF + "</b><br>Analyst data as of <b>" + ANALYST_ASOF + "</b>";
  document.getElementById("footnote").innerHTML =
    "Price, day change, trailing P/E, market cap &amp; 52-week range from Robinhood. " +
    "Average analyst target, consensus rating &amp; forward P/E from " +
    '<a href="https://stockanalysis.com" target="_blank" rel="noopener">stockanalysis.com</a>. ' +
    "Trailing P/E hidden for companies with negative or non-meaningful earnings. " +
    "This snapshot has no live feed &mdash; it refreshes when regenerated. Not investment advice.";

  render();
})();
</script>
